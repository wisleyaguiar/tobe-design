<!doctype html><html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;background:var(--surface-canvas);width:700px;height:360px;box-sizing:border-box;padding:20px 24px;font-family:var(--font-sans);color:var(--text-primary)}
.row{display:flex;align-items:baseline;border-bottom:1px solid var(--border-hairline);padding:8px 0}
.tag{width:60px;font-size:11px;color:var(--text-secondary)}
.h1{font-family:var(--font-display);font-size:44px;letter-spacing:-1.5px}
.h2{font-family:var(--font-display);font-size:34px}
.h3{font-family:var(--font-sans);font-weight:600;font-size:24px}
.h4{font-family:var(--font-sans);font-weight:600;font-size:18px}
.body{font-family:var(--font-sans);font-weight:500;font-size:14px}
.small{font-family:var(--font-sans);font-weight:500;font-size:12px;color:var(--text-secondary)}
</style></head><body>
<div class="row"><div class="tag">H1 72</div><div class="h1">Aa Editorial</div></div>
<div class="row"><div class="tag">H2 48</div><div class="h2">Aa Editorial</div></div>
<div class="row"><div class="tag">H3 32</div><div class="h3">Aa Section Title</div></div>
<div class="row"><div class="tag">H4 24</div><div class="h4">Aa Subsection</div></div>
<div class="row"><div class="tag">Body 14</div><div class="body">The quick brown fox jumps over the lazy dog</div></div>
<div class="row"><div class="tag">Small 12</div><div class="small">Metadata · auxiliary label</div></div>
</body></html>
