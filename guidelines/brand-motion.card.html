<!-- @dsCard group="Brand" viewport="700x140" name="Motion" subtitle="Smooth, cinematic, subtle — never bounce" -->
<!doctype html><html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;background:var(--surface-canvas);width:700px;height:140px;box-sizing:border-box;padding:24px;font-family:var(--font-sans);color:var(--text-secondary);font-size:11px}
.track{position:relative;height:6px;background:var(--gray-900);margin-top:40px;border:1px solid var(--border-subtle)}
.dot{position:absolute;top:-5px;width:16px;height:16px;border-radius:50%;background:var(--accent);animation:mv 2.4s var(--ease-cinematic) infinite}
@keyframes mv{0%{left:0}50%{left:calc(100% - 16px)}100%{left:0}}
</style></head><body>
<div>ease-cinematic · 280ms base · fades, not bounces</div>
<div class="track"><div class="dot"></div></div>
</body></html>
