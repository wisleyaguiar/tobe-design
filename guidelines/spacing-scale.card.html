<!doctype html><html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;background:var(--surface-canvas);width:700px;height:180px;box-sizing:border-box;padding:20px 24px;font-family:var(--font-sans);color:var(--text-secondary);font-size:10px}
.bars{display:flex;align-items:flex-end;gap:10px;height:110px}
.bar{background:var(--accent);width:24px}
.col{display:flex;flex-direction:column;align-items:center;gap:6px}
</style></head><body>
<div class="bars">
<div class="col"><div class="bar" style="height:4px"></div>4</div>
<div class="col"><div class="bar" style="height:8px"></div>8</div>
<div class="col"><div class="bar" style="height:16px"></div>16</div>
<div class="col"><div class="bar" style="height:24px"></div>24</div>
<div class="col"><div class="bar" style="height:32px"></div>32</div>
<div class="col"><div class="bar" style="height:48px"></div>48</div>
<div class="col"><div class="bar" style="height:64px"></div>64</div>
<div class="col"><div class="bar" style="height:96px"></div>96</div>
<div class="col"><div class="bar" style="height:110px"></div>128</div>
</div>
</body></html>
