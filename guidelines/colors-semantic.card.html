<!-- @dsCard group="Colors" viewport="700x180" name="Semantic Tokens" subtitle="Surface / text / border aliases" -->
<!doctype html><html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;background:var(--surface-canvas);font-family:var(--font-sans);padding:20px;box-sizing:border-box;width:700px;height:180px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cell{background:var(--surface-card);border:1px solid var(--border-subtle);padding:12px;font-size:11px;color:var(--text-secondary)}
.cell b{display:block;color:var(--text-primary);font-size:13px;margin-bottom:4px}
</style></head><body>
<div class="grid">
<div class="cell"><b>surface-card</b>--gray-900</div>
<div class="cell"><b>border-subtle</b>--gray-700</div>
<div class="cell"><b style="color:var(--accent)">accent</b>--red-500</div>
<div class="cell"><b>text-primary</b>--white-50</div>
<div class="cell"><b>text-secondary</b>--gray-400</div>
<div class="cell"><b>surface-canvas</b>--black-950</div>
</div>
</body></html>
