<!-- @dsCard group="Brand" viewport="700x260" name="Glass & Aura" subtitle="Frosted glass surfaces over mesh gradients — a premium accent layer for hero/feature moments, not for default cards or tables" -->
<!doctype html><html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;width:700px;height:260px;box-sizing:border-box;background:var(--mesh-ember);position:relative;overflow:hidden;font-family:var(--font-sans)}
.aura{position:absolute;inset:0;background:var(--aura-accent)}
.row{position:relative;height:100%;display:flex;align-items:center;gap:20px;padding:0 24px;box-sizing:border-box}
.glass{flex:1;padding:20px;background:var(--glass-surface);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);color:var(--text-primary)}
.glass .label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px}
.glass .value{font-family:var(--font-display,var(--font-sans));font-size:28px;line-height:1}
.glass.light{background:var(--glass-surface-light)}
</style></head><body>
<div class="aura"></div>
<div class="row">
<div class="glass"><div class="label">Reach</div><div class="value">2.4M</div></div>
<div class="glass light"><div class="label">Engagement</div><div class="value">+18%</div></div>
</div>
</body></html>
